<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Estabilidad de Internet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 900px; 
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
            gap: 20px;
        }
        h1 { margin: 0; font-size: 1.8rem; color: #38bdf8; }
        
        /* Semáforo (Traffic Light) */
        .traffic-light { 
            display: flex; 
            gap: 15px; 
            background: #0f172a; 
            padding: 15px 25px; 
            border-radius: 30px; 
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
        }
        .light { 
            width: 25px; 
            height: 25px; 
            border-radius: 50%; 
            background: #334155; 
            transition: all 0.4s ease; 
        }
        .light.red.active { background: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .light.yellow.active { background: #f59e0b; box-shadow: 0 0 20px #f59e0b; }
        .light.green.active { background: #10b981; box-shadow: 0 0 20px #10b981; }

        /* Tarjetas de Estadísticas */
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: #334155; 
            padding: 25px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;}
        .stat-card p { margin: 0; font-size: 2rem; font-weight: 800; color: #f8fafc; }

        /* Botones */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
            transition: background 0.2s;
            flex: 1;
        }
        .btn:hover { background: #2563eb; }
        .btn.stop { background: #ef4444; }
        .btn.stop:hover { background: #dc2626; }
        .clear-btn { background: #64748b; flex: none;}
        .clear-btn:hover { background: #475569; }

        /* Tabla de Logs */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            background: #0f172a;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 600px;
        }
        th, td { 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid #1e293b; 
        }
        th { 
            background: #0f172a; 
            color: #94a3b8; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        tr:hover { background: #1e293b; }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-good { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-warn { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-fail { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 Monitor de Estabilidad</h1>
            <div class="traffic-light" title="Semáforo de estado de conexión">
                <div class="light red" id="light-red"></div>
                <div class="light yellow" id="light-yellow"></div>
                <div class="light green" id="light-green"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Estado General</h3>
                <p id="status-text" style="font-size: 1.5rem;">Esperando...</p>
            </div>
            <div class="stat-card">
                <h3>Latencia Media</h3>
                <p id="avg-ping">-- <span style="font-size: 1rem; color: #94a3b8;">ms</span></p>
            </div>
            <div class="stat-card">
                <h3>Velocidad (Ancho de Banda)</h3>
                <p id="est-speed">-- <span style="font-size: 1rem; color: #94a3b8;">Mbps</span></p>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="toggleMonitoring()" id="monitor-btn">▶ Iniciar Pruebas</button>
            <button class="btn clear-btn" onclick="clearLogs()">🗑️ Borrar Logs</button>
        </div>

        <div class="table-wrapper">
            <table id="log-table">
                <thead>
                    <tr>
                        <th>Servidor</th>
                        <th>Latencia (ms)</th>
                        <th>Velocidad (Mbps)</th>
                        <th>Estado</th>
                        <th>Fecha / Hora</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas dinámicas aquí -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sitios objetivo para las pruebas de "Ping" por HTTP.
        const DOMAINS = [
            { name: 'Speedtest', url: 'https://www.speedtest.net/favicon.ico' },
            { name: 'nPerf', url: 'https://www.nperf.com/favicon.ico' },
            { name: 'Cantv', url: 'https://velocidadaba.cantv.net/favicon.ico' } 
        ];

        let monitoringInterval;
        let isMonitoring = false;
        // Recuperar logs usando LocalStorage
        let logs = JSON.parse(localStorage.getItem('internetMonitorLogs_v1')) || [];

        function updateUI() {
            const tbody = document.querySelector('#log-table tbody');
            tbody.innerHTML = '';
            
            let totalPing = 0;
            let validPings = 0;
            let currentSpeed = '--';

            // Mostrar los últimos 30 registros
            const recentLogs = logs.slice(-30).reverse();
            for (let log of recentLogs) {
                let statusClass = 'status-fail';
                let statusText = 'Error';
                
                if (log.ping > 0 && log.ping < 150) {
                    statusClass = 'status-good';
                    statusText = 'Estable';
                } else if (log.ping >= 150) {
                    statusClass = 'status-warn';
                    statusText = 'Lento';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600; color: #e2e8f0;">${log.server}</td>
                    <td>${log.ping > 0 ? log.ping : '---'}</td>
                    <td>${log.speed || '--'}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td style="color: #94a3b8; font-size: 0.9rem;">${log.timestamp}</td>
                `;
                tbody.appendChild(tr);

                if (log.ping > 0) {
                    totalPing += log.ping;
                    validPings++;
                }
            }

            // Calcular media
            const avgPing = validPings > 0 ? Math.round(totalPing / validPings) : 0;
            document.getElementById('avg-ping').innerHTML = avgPing > 0 ? `${avgPing} <span style="font-size: 1rem; color: #94a3b8;">ms</span>` : '-- <span style="font-size: 1rem; color: #94a3b8;">ms</span>';

            // Leer ancho de banda estimado desde la API del navegador (Soportado en Chrome/Edge)
            if (navigator.connection && navigator.connection.downlink) {
                currentSpeed = navigator.connection.downlink;
                document.getElementById('est-speed').innerHTML = `${currentSpeed} <span style="font-size: 1rem; color: #94a3b8;">Mbps</span>`;
            } else {
                document.getElementById('est-speed').innerHTML = `N/A <span style="font-size: 1rem; color: #94a3b8;">(No sorportado)</span>`;
            }

            // Actualizar Semáforo
            document.querySelectorAll('.light').forEach(el => el.classList.remove('active'));
            
            if (validPings === 0 && recentLogs.length > 0) {
                document.getElementById('light-red').classList.add('active');
                document.getElementById('status-text').innerText = 'Sin Conexión';
                document.getElementById('status-text').style.color = '#ef4444';
            } else if (avgPing > 200 || navigator.onLine === false) {
                document.getElementById('light-yellow').classList.add('active');
                document.getElementById('status-text').innerText = 'Inestable';
                document.getElementById('status-text').style.color = '#f59e0b';
            } else if (avgPing > 0) {
                document.getElementById('light-green').classList.add('active');
                document.getElementById('status-text').innerText = 'Excelente';
                document.getElementById('status-text').style.color = '#10b981';
            } else {
                document.getElementById('status-text').innerText = 'Esperando datos...';
                document.getElementById('status-text').style.color = '#f8fafc';
            }
        }

        // Simula un "Ping" calculando el tiempo que tarda en descargar un recurso (favicon)
        async function pingServer(server) {
            return new Promise((resolve) => {
                const start = performance.now();
                const img = new Image();
                img.onload = () => {
                    resolve(Math.round(performance.now() - start));
                };
                img.onerror = () => {
                    // Si falla por CORS aún puede significar que hubo respuesta de red.
                    // Para evitar falsos positivos largos, solo lo validamos si fue rápido.
                    const time = performance.now() - start;
                    if(time < 2500) resolve(Math.round(time));
                    else resolve(-1);
                };
                // Prevenir caché añadiendo un parámetro numérico aleatorio
                img.src = `${server.url}?cb=${new Date().getTime()}`;
                
                // Timeout de 5 segundos
                setTimeout(() => resolve(-1), 5000); 
            });
        }

        async function runTests() {
            if(!navigator.onLine) {
                // Registrar caída total si no hay red
                logs.push({
                    timestamp: new Date().toLocaleTimeString(),
                    server: 'Sistema',
                    ping: -1,
                    speed: 0
                });
            } else {
                for (let server of DOMAINS) {
                    const pingTime = await pingServer(server);
                    let speed = 0;
                    if (navigator.connection && navigator.connection.downlink) {
                        speed = navigator.connection.downlink;
                    }
                    
                    const logEntry = {
                        timestamp: new Date().toLocaleTimeString(),
                        server: server.name,
                        ping: pingTime,
                        speed: speed
                    };

                    logs.push(logEntry);
                }
            }
            // Mantener solo los últimos 500 registros para no llenar el localStorage
            if(logs.length > 500) logs.splice(0, logs.length - 500);
            
            localStorage.setItem('internetMonitorLogs_v1', JSON.stringify(logs));
            updateUI();
        }

        function toggleMonitoring() {
            const btn = document.getElementById('monitor-btn');
            if (isMonitoring) {
                clearInterval(monitoringInterval);
                btn.innerHTML = '▶ Iniciar Pruebas';
                btn.classList.remove('stop');
            } else {
                runTests(); 
                monitoringInterval = setInterval(runTests, 10000); // 10 segundos
                btn.innerHTML = '⏸ Detener Monitoreo';
                btn.classList.add('stop');
            }
            isMonitoring = !isMonitoring;
        }

        function clearLogs() {
            if(confirm('¿Estás seguro de que deseas borrar todos los logs guardados?')) {
                logs = [];
                localStorage.removeItem('internetMonitorLogs_v1');
                updateUI();
            }
        }

        // Inicializar interfaz
        updateUI();
    </script>
</body>
</html>
